define host {
    use                     linux-server
    host_name               college-event-app
    alias                   College Event Spring Boot Application
    address                 host.docker.internal
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                             generic-service
    host_name                       college-event-app
    service_description             Spring Boot Health
    check_command                   check_http!-p 8080 -u /actuator/health
}