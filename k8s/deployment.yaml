apiVersion: apps/v1
kind: Deployment

metadata:
  name: college-event-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: college-event

  template:
    metadata:
      labels:
        app: college-event

    spec:
      containers:
      - name: college-event
        image: college-event:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 8080